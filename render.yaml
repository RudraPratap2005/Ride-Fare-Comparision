services:
  - type: web
    name: ride-fare-comparision
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: RIDESCOPE_DATABASE_PATH
        value: /opt/render/project/src/data/ride_fare_comparision.db
